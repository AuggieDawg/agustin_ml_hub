services:
  db:
    image: postgres:16
    container_name: agustin_ml_hub_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agustin_ml_hub
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  ml:
    build:
      context: ./services/ml
    container_name: agustin_ml_hub_ml
    ports:
      - "8001:8000"



volumes:
  db_data:
